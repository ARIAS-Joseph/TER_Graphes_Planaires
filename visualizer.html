<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Basis Visualizer</title>
    <link rel="stylesheet" href="style_visualizer.css">
</head>
<body>

<header>
    <div class="logo">Cycle Basis Visualizer</div>
    <div class="header-meta" id="headerMeta" style="display:none">
        <div class="meta-item">
            <span class="meta-label">VERTICES</span>
            <span class="meta-value" id="metaV">—</span>
        </div>
        <div class="meta-item">
            <span class="meta-label">EDGES</span>
            <span class="meta-value" id="metaE">—</span>
        </div>
        <div class="meta-item">
            <span class="meta-label">BASES</span>
            <span class="meta-value" id="metaM">—</span>
        </div>
        <div class="meta-item">
            <span class="meta-label">DIM</span>
            <span class="meta-value" id="metaD">—</span>
        </div>
    </div>
    <label class="upload-btn" for="fileInput">
        Load graph file
    </label>
    <input type="file" id="fileInput" accept=".txt">
</header>

<div class="workspace">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">Minimal Cycle Bases</div>
        <div class="bases-list" id="basesList">
            <div style="padding: 32px 16px; text-align:center; color:var(--text-dim); font-size:0.72rem; line-height:1.8">
                Load a graph file to explore its cycle bases.
            </div>
        </div>
    </aside>

    <!-- GRAPH AREA -->
    <div class="canvas-area" id="canvasArea">
        <div class="empty-state" id="emptyState">
            <p><strong>No graph loaded</strong></p>
            <p>Click "Load graph file" to open a file from save_graph()</p>
        </div>

        <svg id="graphSvg" style="display:none">
            <defs>
                <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L6,3 z" fill="var(--edge-default)"/>
                </marker>
            </defs>
            <g id="edgesGroup"></g>
            <g id="edgeLabelsGroup"></g>
            <g id="nodesGroup"></g>
        </svg>

        <!-- Controls -->
        <div class="controls" id="controls" style="display:none">
            <button class="ctrl-btn" id="zoomIn" title="Zoom in">+</button>
            <button class="ctrl-btn" id="zoomOut" title="Zoom out">−</button>
            <button class="ctrl-btn" id="zoomFit" title="Fit to view">⊡</button>
        </div>

        <!-- Tooltip -->
        <div class="tooltip" id="tooltip"></div>
    </div>
</div>

<script src="visualizer.js"> </script>
</body>
</html>
