<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planar Graph Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0c10;
      color: #c8d0e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #111318;
      padding: 16px 24px;
      border-bottom: 1px solid #1e2330;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #eef0f8;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 0.85rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-value {
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 4px;
      background: #1e2330;
    }

    .status-value.planar {
      background: #0d3818;
      color: #51cf66;
    }

    .status-value.nonplanar {
      background: #3d1515;
      color: #ff6b6b;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 8px 16px;
      background: #1e2330;
      border: 1px solid #2e3550;
      color: #c8d0e8;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    button:hover {
      background: #2e3550;
      color: #eef0f8;
    }

    button.primary {
      background: #1a2a5e;
      border-color: #4f7cff;
      color: #4f7cff;
    }

    button.primary:hover {
      background: #4f7cff;
      color: white;
    }

    button.danger {
      background: #3d1515;
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    button.danger:hover {
      background: #ff6b6b;
      color: white;
    }

    .workspace {
      flex: 1;
      display: flex;
      position: relative;
    }

    .sidebar {
      width: 280px;
      background: #111318;
      border-right: 1px solid #1e2330;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a6380;
      margin-bottom: 12px;
    }

    .mode-group {
      margin-bottom: 24px;
    }

    .mode-btn {
      width: 100%;
      text-align: left;
      margin-bottom: 8px;
    }

    .mode-btn.active {
      background: #1a2a5e;
      border-color: #4f7cff;
      color: #4f7cff;
    }

    .canvas-container {
      flex: 1;
      position: relative;
      background:
              radial-gradient(ellipse at 30% 20%, rgba(79,124,255,0.03) 0%, transparent 60%),
              #0a0c10;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    .intersection-alert {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 107, 107, 0.95);
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .intersection-alert.show {
      opacity: 1;
    }

    .instructions {
      margin-top: 24px;
      padding: 16px;
      background: #0f1115;
      border-radius: 6px;
      font-size: 0.75rem;
      line-height: 1.8;
      color: #5a6380;
    }

    .instructions strong {
      color: #c8d0e8;
    }

    input[type="file"] {
      width: 100%;
      padding: 8px;
      background: #1e2330;
      border: 1px solid #2e3550;
      color: #c8d0e8;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      margin-bottom: 12px;
    }

    input[type="file"]::file-selector-button {
      padding: 6px 12px;
      background: #2e3550;
      border: none;
      color: #c8d0e8;
      border-radius: 3px;
      cursor: pointer;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="title">🔷 Planar Graph Editor</div>
  <div class="status">
    <div class="status-item">
      <span>Sommets:</span>
      <span class="status-value" id="vertexCount">0</span>
    </div>
    <div class="status-item">
      <span>Arêtes:</span>
      <span class="status-value" id="edgeCount">0</span>
    </div>
    <div class="status-item">
      <span>Croisements:</span>
      <span class="status-value" id="intersectionCount">0</span>
    </div>
  </div>
  <div class="controls">
    <button class="primary" onclick="loadFromFile()">📂 Charger</button>
    <button onclick="exportGraph()">💾 Exporter</button>
    <button class="danger" onclick="clearGraph()">🗑️ Effacer</button>
  </div>
</header>

<div class="workspace">
  <aside class="sidebar">
    <div class="mode-group">
      <h3>Mode</h3>
      <button class="mode-btn active" onclick="setMode('move')" id="btnMove">
        ✋ Déplacer les sommets
      </button>
      <button class="mode-btn" onclick="setMode('addVertex')" id="btnAddVertex">
        ➕ Ajouter un sommet
      </button>
      <button class="mode-btn" onclick="setMode('addEdge')" id="btnAddEdge">
        🔗 Ajouter une arête
      </button>
      <button class="mode-btn" onclick="setMode('delete')" id="btnDelete">
        ❌ Supprimer
      </button>
    </div>

    <div class="mode-group">
      <h3>Importer</h3>
      <input type="file" id="fileInput" accept=".txt" onchange="handleFileUpload(event)">
    </div>

    <div class="instructions">
      <strong>Mode Déplacer:</strong> Cliquez et glissez les sommets<br><br>
      <strong>Mode Sommet:</strong> Cliquez pour créer<br><br>
      <strong>Mode Arête:</strong> Cliquez sur deux sommets<br><br>
      <strong>Mode Supprimer:</strong> Cliquez sur un élément<br><br>
      Les arêtes qui se croisent apparaissent en <span style="color:#ff6b6b">rouge</span>
    </div>
  </aside>

  <div class="canvas-container">
    <canvas id="canvas"></canvas>
    <div class="intersection-alert" id="alert"></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const alert = document.getElementById('alert');

  // State
  let vertices = [];
  let edges = [];
  let mode = 'move';
  let draggedVertex = null;
  let firstVertex = null; // For edge creation
  let intersections = new Set();

  // Resize canvas
  function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    draw();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Mode selection
  function setMode(newMode) {
    mode = newMode;
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('btn' + newMode.charAt(0).toUpperCase() + newMode.slice(1)).classList.add('active');
    firstVertex = null;
    canvas.style.cursor = mode === 'move' ? 'grab' : mode === 'addVertex' ? 'crosshair' : mode === 'delete' ? 'not-allowed' : 'pointer';
  }

  // Clear graph
  function clearGraph() {
    if (confirm('Effacer tout le graphe ?')) {
      vertices = [];
      edges = [];
      firstVertex = null;
      updateStats();
      draw();
    }
  }

  // Find vertex at position
  function findVertex(x, y, radius = 20) {
    for (let v of vertices) {
      const dx = v.x - x;
      const dy = v.y - y;
      if (dx*dx + dy*dy <= radius*radius) {
        return v;
      }
    }
    return null;
  }

  // Check if two edges intersect
  function doEdgesIntersect(e1, e2) {
    const v1 = vertices.find(v => v.id === e1.from);
    const v2 = vertices.find(v => v.id === e1.to);
    const v3 = vertices.find(v => v.id === e2.from);
    const v4 = vertices.find(v => v.id === e2.to);

    // Skip if edges share a vertex
    if (e1.from === e2.from || e1.from === e2.to || e1.to === e2.from || e1.to === e2.to) {
      return false;
    }

    // Line segment intersection algorithm
    const d1 = (v2.x - v1.x) * (v3.y - v1.y) - (v2.y - v1.y) * (v3.x - v1.x);
    const d2 = (v2.x - v1.x) * (v4.y - v1.y) - (v2.y - v1.y) * (v4.x - v1.x);
    const d3 = (v4.x - v3.x) * (v1.y - v3.y) - (v4.y - v3.y) * (v1.x - v3.x);
    const d4 = (v4.x - v3.x) * (v2.y - v3.y) - (v4.y - v3.y) * (v2.x - v3.x);

    return (d1 * d2 < 0) && (d3 * d4 < 0);
  }

  // Detect all intersections
  function detectIntersections() {
    intersections.clear();
    for (let i = 0; i < edges.length; i++) {
      for (let j = i + 1; j < edges.length; j++) {
        if (doEdgesIntersect(edges[i], edges[j])) {
          intersections.add(i);
          intersections.add(j);
        }
      }
    }

    // Update alert
    if (intersections.size > 0) {
      const uniquePairs = Math.floor(intersections.size / 2);
      alert.textContent = `⚠️ ${uniquePairs} croisement${uniquePairs > 1 ? 's' : ''} détecté${uniquePairs > 1 ? 's' : ''} !`;
      alert.classList.add('show');
    } else {
      alert.classList.remove('show');
    }

    updateStats();
  }

  // Update statistics
  function updateStats() {
    document.getElementById('vertexCount').textContent = vertices.length;
    document.getElementById('edgeCount').textContent = edges.length;
    const intersectionElem = document.getElementById('intersectionCount');
    intersectionElem.textContent = intersections.size > 0 ? Math.floor(intersections.size / 2) : 0;
    intersectionElem.className = 'status-value ' + (intersections.size > 0 ? 'nonplanar' : 'planar');
  }

  // Draw everything
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw edges
    edges.forEach((edge, idx) => {
      const v1 = vertices.find(v => v.id === edge.from);
      const v2 = vertices.find(v => v.id === edge.to);
      if (!v1 || !v2) return;

      ctx.strokeStyle = intersections.has(idx) ? '#ff6b6b' : '#2e3550';
      ctx.lineWidth = intersections.has(idx) ? 4 : 2;
      ctx.beginPath();
      ctx.moveTo(v1.x, v1.y);
      ctx.lineTo(v2.x, v2.y);
      ctx.stroke();

      // Draw intersection glow
      if (intersections.has(idx)) {
        ctx.strokeStyle = 'rgba(255, 107, 107, 0.3)';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(v1.x, v1.y);
        ctx.lineTo(v2.x, v2.y);
        ctx.stroke();
      }
    });

    // Draw vertices
    vertices.forEach(v => {
      // Outer circle
      ctx.fillStyle = '#111318';
      ctx.strokeStyle = '#4f7cff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(v.x, v.y, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Label
      ctx.fillStyle = '#c8d0e8';
      ctx.font = 'bold 12px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(v.id, v.x, v.y);
    });

    // Draw temporary edge during creation
    if (mode === 'addEdge' && firstVertex) {
      ctx.strokeStyle = '#4f7cff';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(firstVertex.x, firstVertex.y);
      ctx.lineTo(mouseX, mouseY);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Mouse tracking
  let mouseX = 0, mouseY = 0;
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;

    if (mode === 'move' && draggedVertex) {
      draggedVertex.x = mouseX;
      draggedVertex.y = mouseY;
      detectIntersections();
      draw();
    } else if (mode === 'addEdge' && firstVertex) {
      draw();
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const clickedVertex = findVertex(x, y);

    if (mode === 'move' && clickedVertex) {
      draggedVertex = clickedVertex;
      canvas.style.cursor = 'grabbing';
    } else if (mode === 'addVertex' && !clickedVertex) {
      vertices.push({ id: vertices.length, x, y });
      updateStats();
      draw();
    } else if (mode === 'addEdge') {
      if (!firstVertex && clickedVertex) {
        firstVertex = clickedVertex;
      } else if (firstVertex && clickedVertex && clickedVertex !== firstVertex) {
        // Check if edge already exists
        const exists = edges.some(e =>
                (e.from === firstVertex.id && e.to === clickedVertex.id) ||
                (e.from === clickedVertex.id && e.to === firstVertex.id)
        );
        if (!exists) {
          edges.push({ from: firstVertex.id, to: clickedVertex.id });
          detectIntersections();
        }
        firstVertex = null;
        draw();
      }
    } else if (mode === 'delete' && clickedVertex) {
      // Remove vertex and connected edges
      edges = edges.filter(e => e.from !== clickedVertex.id && e.to !== clickedVertex.id);
      vertices = vertices.filter(v => v.id !== clickedVertex.id);
      detectIntersections();
      updateStats();
      draw();
    }
  });

  canvas.addEventListener('mouseup', () => {
    draggedVertex = null;
    if (mode === 'move') {
      canvas.style.cursor = 'grab';
    }
  });

  // Export graph
  function exportGraph() {
    const data = {
      vertices: vertices,
      edges: edges
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'graph.json';
    a.click();
  }

  // Load from file
  function loadFromFile() {
    document.getElementById('fileInput').click();
  }

  function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;

        // Try to parse as save_graph format
        const lines = text.trim().split('\n').filter(l => l.trim().length > 0);
        const [V, E] = lines[0].split(/\s+/).map(Number);

        vertices = [];
        edges = [];

        // Read vertices
        for (let i = 0; i < V; i++) {
          const [id, x, y] = lines[1 + i].split(/\s+/).map(Number);
          // Scale coordinates to fit canvas
          vertices.push({ id, x: x * 100 + 100, y: y * 100 + 100 });
        }

        // Read edges
        for (let i = 0; i < E; i++) {
          const parts = lines[1 + V + i].split(/\s+/).map(Number);
          edges.push({ from: parts[1], to: parts[2] });
        }

        detectIntersections();
        updateStats();
        draw();
      } catch (err) {
        alert('Erreur de lecture du fichier: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // Initial draw
  draw();
</script>
</body>
</html>
